name: Feature request
description: Propose a scoped feature or roadmap task for DesktopPal
title: "[Feature]: "
labels:
  - type:feature
  - status:needs-design
body:
  - type: markdown
    attributes:
      value: |
        Feature requests should be grounded in the current roadmap. If this belongs to an existing milestone or epic, link it.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need or project gap does this address?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: What should be true after this work is complete?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Describe the intended scope and any non-goals or constraints.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Provide a checklist-style definition of done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Suggested milestone
      description: For example, Tritium-1 Trustworthy Prototype
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies or related issues
      description: Link related issues, epics, or roadmap sections if known.
