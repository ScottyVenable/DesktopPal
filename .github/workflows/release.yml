name: Release Build

# Phase A packaging pipeline scaffold (issue #37, design: docs/design/packaging.md).
#
# Manual-trigger only. Runs the canonical scripts/build-release.ps1 on a stock
# windows-latest runner and uploads the published self-contained payload as a
# workflow artifact. This workflow does NOT:
#   - sign the binary
#   - create a GitHub Release
#   - publish to any feed
# Those are deferred to Phase B/C - see follow-up issues linked from #37.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version stamp (e.g. 0.2.0). Leave blank to use csproj default.'
        required: false
        default: ''
      runtime:
        description: 'Target runtime identifier'
        required: false
        default: 'win-x64'

permissions:
  contents: read

jobs:
  package:
    name: Publish self-contained (Windows, .NET 10)
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Show .NET info
        run: dotnet --info

      - name: Run release build script
        id: build
        shell: pwsh
        run: |
          ./scripts/build-release.ps1 `
            -Version '${{ github.event.inputs.version }}' `
            -Runtime '${{ github.event.inputs.runtime }}'

      - name: List artifact contents
        shell: pwsh
        run: Get-ChildItem -Recurse artifacts | Select-Object FullName, Length

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPal-${{ github.event.inputs.runtime || 'win-x64' }}-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: error
          retention-days: 14
